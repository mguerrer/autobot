apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autobot.name" . }}-wa-bridge
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autobot.labels" . | nindent 4 }}
    app.kubernetes.io/component: wa-bridge
spec:
  replicas: {{ .Values.waBridge.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "autobot.name" . }}-wa-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "autobot.name" . }}-wa-bridge
    spec:
      containers:
        - name: wa-bridge
          image: {{ .Values.waBridge.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.waBridge.port }}
          env:
            {{- range $key, $value := .Values.waBridge.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.waBridge.resources.requests.cpu }}
              memory: {{ .Values.waBridge.resources.requests.memory }}
            limits:
              cpu: {{ .Values.waBridge.resources.limits.cpu }}
              memory: {{ .Values.waBridge.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /status
              port: {{ .Values.waBridge.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: {{ .Values.waBridge.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
