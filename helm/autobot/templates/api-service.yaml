apiVersion: v1
kind: Service
metadata:
  name: {{ include "autobot.name" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "autobot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: {{ include "autobot.name" . }}-api
  ports:
    - protocol: TCP
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
  type: ClusterIP
